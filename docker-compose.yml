version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: patitas-tristes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patitas_tristes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patitas-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patitas-tristes-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/patitas_tristes
      JWT_SECRET: dev-secret-key-change-in-production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - patitas-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patitas-tristes-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - patitas-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  patitas-network:
    driver: bridge
